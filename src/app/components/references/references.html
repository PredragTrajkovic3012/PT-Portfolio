<div class="w-full py-20 px-6 md:px-20">
  <h2
    class="md:text-3xl text-2xl font-bold mb-12 text-center text-[var(--color-global)]"
  >
    References
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    @for (ref of references; track ref.name) {
      <div
        class="flex flex-col items-center p-6 rounded-2xl bg-[var(--skill-card-bg)] shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2 cursor-pointer reference-card border border-[var(--skill-card-border)]"
      >
        <!-- IMAGE -->
        <img
          [src]="ref.image"
          [alt]="ref.name"
          class="w-28 h-28 rounded-full object-cover mb-4 shadow-md border-4 border-[var(--color-global)]"
        />

        <h3
          class="text-lg font-bold text-center text-[var(--skill-card-text)] mb-1"
        >
          {{ ref.name }}
        </h3>

        <p
          class="text-sm text-[var(--color-global)] font-semibold text-center mb-3"
        >
          {{ ref.title }}
        </p>

        <div class="flex gap-1 mb-4">
          @for (star of getStars(ref.rating); track star) {
            <span class="text-yellow-400 text-lg">★</span>
          }
        </div>

        <!-- DESCRIPTION -->
        <p
          class="text-sm text-center text-[var(--skill-card-text)]/80 leading-relaxed mb-4"
        >
          {{ ref.description }}
        </p>

        <!-- LINKEDIN LINK -->
        @if (ref.linkedin) {
          <a
            [href]="ref.linkedin"
            target="_blank"
            rel="noopener noreferrer"
            class="mt-auto px-4 py-2 rounded-lg bg-[#0A66C2] text-white font-semibold text-sm hover:bg-[#084399] transition-colors duration-300 flex items-center gap-2"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.475-2.236-1.986-2.236-1.081 0-1.722.722-2.004 1.418-.103.249-.129.597-.129.946v5.441h-3.554s.047-8.842 0-9.769h3.554v1.383c.43-.664 1.199-1.61 2.920-1.61 2.135 0 3.753 1.395 3.753 4.402v5.594zM5.337 9.432c-1.144 0-1.915-.755-1.915-1.699 0-.955.771-1.699 1.915-1.699 1.144 0 1.915.744 1.915 1.699 0 .944-.771 1.699-1.915 1.699zm1.598 11.02H3.739V9.663h3.196v10.789zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"
              />
            </svg>
            LinkedIn
          </a>
        }
      </div>
    }
  </div>
</div>
